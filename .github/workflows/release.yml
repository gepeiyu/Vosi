name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-latest
            artifact: vosi-macos-arm64
          - runs-on: macos-15-intel
            artifact: vosi-macos-x64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: ~/.cache/sherpa-onnx
          key: sherpa-onnx-v1.13.2-macos-${{ runner.arch }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: sherpa-onnx-v1.13.2-macos-${{ runner.arch }}-

      - name: Download sherpa-onnx prebuilt libs
        run: |
          ARCHIVE_DIR="$HOME/.cache/sherpa-onnx"
          echo "SHERPA_ONNX_ARCHIVE_DIR=$ARCHIVE_DIR" >> "$GITHUB_ENV"
          mkdir -p "$ARCHIVE_DIR"
          case "${{ runner.arch }}" in
            ARM64) ARCH=arm64 ;;
            X64) ARCH=x64 ;;
            *)
              echo "Unsupported runner arch: ${{ runner.arch }}"
              exit 1
              ;;
          esac
          ARCHIVE="sherpa-onnx-v1.13.2-osx-${ARCH}-static-lib.tar.bz2"
          DEST="$ARCHIVE_DIR/$ARCHIVE"
          if [ ! -f "$DEST" ]; then
            curl -fsSL --retry 5 -o "$DEST" \
              "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.2/$ARCHIVE"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Download models
        run: ./scripts/download-models.sh
        continue-on-error: true

      - name: Prepare bundled models
        run: bash scripts/prepare-bundle-models.sh

      - name: Build macOS app
        run: npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: ~/.cache/sherpa-onnx
          key: sherpa-onnx-v1.13.2-win-x64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: sherpa-onnx-v1.13.2-win-x64-

      - name: Download sherpa-onnx prebuilt libs
        shell: pwsh
        run: |
          $dir = Join-Path $env:USERPROFILE ".cache\sherpa-onnx"
          echo "SHERPA_ONNX_ARCHIVE_DIR=$dir" >> $env:GITHUB_ENV
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $archive = "sherpa-onnx-v1.13.2-win-x64-static-MT-Release-lib.tar.bz2"
          $dest = Join-Path $dir $archive
          if (-not (Test-Path $dest)) {
            Invoke-WebRequest -Uri "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.2/$archive" -OutFile $dest
          }

      - name: Install dependencies
        run: npm ci

      - name: Download models
        run: bash scripts/download-models.sh
        continue-on-error: true

      - name: Prepare bundled models
        run: bash scripts/prepare-bundle-models.sh

      - name: Build Windows app
        run: npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: vosi-windows-x64
          path: |
            src-tauri/target/release/bundle/nsis/*.exe

  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: find dist -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.dmg
            dist/**/*.exe
