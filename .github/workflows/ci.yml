name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    env:
      SHERPA_ONNX_ARCHIVE_DIR: ~/.cache/sherpa-onnx
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v4
        with:
          path: ~/.cache/sherpa-onnx
          key: sherpa-onnx-v1.13.2-macos-${{ runner.arch }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: sherpa-onnx-v1.13.2-macos-${{ runner.arch }}-

      - name: Download sherpa-onnx prebuilt libs
        run: |
          mkdir -p "$HOME/.cache/sherpa-onnx"
          case "${{ runner.arch }}" in
            ARM64) ARCH=arm64 ;;
            X64) ARCH=x64 ;;
            *)
              echo "Unsupported runner arch: ${{ runner.arch }}"
              exit 1
              ;;
          esac
          ARCHIVE="sherpa-onnx-v1.13.2-osx-${ARCH}-static-lib.tar.bz2"
          DEST="$HOME/.cache/sherpa-onnx/$ARCHIVE"
          if [ ! -f "$DEST" ]; then
            curl -fsSL --retry 5 -o "$DEST" \
              "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.2/$ARCHIVE"
          fi

      - name: Offline runtime guard
        run: |
          if grep -rE 'reqwest|ureq|hyper' src-tauri/Cargo.toml; then
            echo "Direct HTTP client dependency found in Cargo.toml"
            exit 1
          fi

      - name: Unit tests
        run: cd src-tauri && cargo test --lib

      - name: Clippy
        run: cd src-tauri && cargo clippy --lib -- -D warnings
