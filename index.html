<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vosi 设置</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body data-window-title="window.main.title">
    <main class="settings">
      <header class="settings-header">
        <h1>Vosi</h1>
        <p class="subtitle" data-i18n="settings.subtitle"></p>
      </header>

      <section class="settings-section permissions-section" aria-labelledby="permissions-title">
        <h2 id="permissions-title" data-i18n="settings.section.permissions"></h2>
        <p id="voice-ready-status" class="voice-ready-status" data-i18n="settings.status.checking"></p>
        <ul id="permissions-list" class="permissions-list"></ul>
        <p id="permissions-tip" class="field-note hidden"></p>
        <button type="button" id="recheck-permissions" class="secondary-btn" data-i18n="settings.btn.recheck_permissions"></button>
      </section>

      <form id="settings-form" class="settings-form">
        <section class="settings-section">
          <h2 data-i18n="settings.section.voice"></h2>

          <label>
            <span data-i18n="settings.field.silence_threshold"></span>
            <input id="silence-threshold" name="silence_threshold_ms" type="number" min="200" max="3000" step="100" />
          </label>

          <label>
            <span data-i18n="settings.field.min_speech"></span>
            <input id="min-speech-ms" name="min_speech_ms" type="number" min="100" max="1000" step="50" />
          </label>
        </section>

        <section class="settings-section">
          <h2 data-i18n="settings.section.recognition"></h2>

          <label>
            <span data-i18n="settings.field.asr_mode"></span>
            <select id="asr-mode" name="asr_mode">
              <option value="short" data-i18n="settings.option.asr_mode.short"></option>
              <option value="long" data-i18n="settings.option.asr_mode.long"></option>
            </select>
          </label>

          <label>
            <span data-i18n="settings.field.num_threads"></span>
            <select id="num-threads" name="num_threads">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </label>

          <label class="checkbox">
            <input id="hotword-enabled" name="hotword_enabled" type="checkbox" />
            <span data-i18n="settings.field.hotword_enabled"></span>
          </label>

          <label>
            <span data-i18n="settings.field.hotword_file"></span>
            <input id="hotword-file" name="hotword_file" type="text" />
          </label>
        </section>

        <section class="settings-section">
          <h2 data-i18n="settings.section.output"></h2>

          <label>
            <span data-i18n="settings.field.inject_method"></span>
            <select id="inject-method" name="inject_method">
              <option value="type" data-i18n="settings.option.inject.type"></option>
              <option value="paste" data-i18n="settings.option.inject.paste"></option>
            </select>
          </label>
        </section>

        <section class="settings-section">
          <h2 data-i18n="settings.section.general"></h2>

          <label>
            <span data-i18n="settings.field.locale"></span>
            <select id="locale" name="locale">
              <option value="zh" data-i18n="settings.option.locale.zh"></option>
              <option value="en" data-i18n="settings.option.locale.en"></option>
              <option value="ja" data-i18n="settings.option.locale.ja"></option>
            </select>
          </label>

          <label>
            <span data-i18n="settings.field.trigger_key"></span>
            <select id="trigger-key" name="trigger_key">
              <option value="RightCommand" data-i18n="settings.option.trigger.right_command_mac"></option>
              <option value="LeftCommand" data-i18n="settings.option.trigger.left_command"></option>
              <option value="RightAlt" data-i18n="settings.option.trigger.right_alt_win"></option>
              <option value="LeftAlt" data-i18n="settings.option.trigger.left_alt"></option>
              <option value="RightCtrl" data-i18n="settings.option.trigger.right_ctrl"></option>
              <option value="LeftCtrl" data-i18n="settings.option.trigger.left_ctrl"></option>
            </select>
          </label>

          <label class="checkbox">
            <input id="overlay-enabled" name="overlay_enabled" type="checkbox" />
            <span data-i18n="settings.field.overlay_enabled"></span>
          </label>

          <label class="checkbox">
            <input id="show-tray" name="show_tray" type="checkbox" />
            <span data-i18n="settings.field.show_tray"></span>
          </label>

          <label class="checkbox">
            <input id="start-on-boot" name="start_on_boot" type="checkbox" />
            <span data-i18n="settings.field.start_on_boot"></span>
          </label>
          <p class="field-note" data-i18n="settings.note.start_on_boot"></p>
        </section>

        <div class="form-actions">
          <button type="submit" id="save-btn" data-i18n="settings.btn.save"></button>
          <span id="save-status" class="save-status" aria-live="polite"></span>
        </div>
      </form>
    </main>
  </body>
</html>
